{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="apple-card text-center p-5 mt-4">
            <h2 class="fw-bold mb-3" style="letter-spacing: -0.5px;">登录</h2>
            <p class="text-muted mb-4" style="font-size: 0.95rem;">欢迎回到源控智创</p>
            <form method="POST">
                <div class="mb-3">
                    <input type="text" name="student_id" class="form-control" placeholder="学号" required style="background: #f5f5f7;">
                </div>
                <div class="mb-4">
                    <input type="password" name="password" class="form-control" placeholder="密码" required style="background: #f5f5f7;">
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 py-2">继续</button>
            </form>
            <div class="mt-4 pt-2 border-top">
                <a href="{{ url_for('register') }}" class="text-decoration-none text-primary" style="font-size: 0.9rem; font-weight: 500;">没有账号？立即注册</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
