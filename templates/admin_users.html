{% extends "base.html" %}
{% block content %}
<h2 class="fw-bold mb-4">👑 社团成员一览</h2>
<div class="apple-card p-0 overflow-hidden">
    <table class="table table-hover mb-0" style="vertical-align: middle;">
        <thead class="bg-light text-muted" style="font-size: 0.85rem; text-transform: uppercase;">
            <tr>
                <th class="ps-4">成员信息</th>
                <th>手机号</th>
                <th>领用记录</th>
                <th>比赛经历</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr>
                <td class="ps-4 py-3">
                    <div class="fw-bold text-dark">{{ u.name }} {% if u.is_admin %}<span class="badge bg-dark ms-2">管理员</span>{% endif %}</div>
                    <small class="text-muted">{{ u.major }} | {{ u.student_id }}</small>
                </td>
                <td>{{ u.phone }}</td>
                <td><span class="badge bg-secondary">{{ u.logs|length }} 次领用</span></td>
                <td><span class="badge bg-primary">{{ u.competitions|length }} 次比赛</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
