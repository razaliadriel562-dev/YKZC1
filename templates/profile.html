{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 mt-4">
    <h1 class="fw-bold" style="font-size: 2.5rem; letter-spacing: -1px;">个人信息中心</h1>
    {% if session.is_admin %}
    <a href="{{ url_for('admin_users') }}" class="btn btn-dark" style="border-radius: 99px;">👑 查看所有社团成员</a>
    {% endif %}
</div>

<div class="row g-4">
    <div class="col-md-4">
        <div class="apple-card">
            <h5 class="fw-bold mb-4 border-bottom pb-2">基本资料</h5>
            <p class="text-muted mb-1">姓名</p><p class="fw-bold fs-5">{{ user.name }}</p>
            <p class="text-muted mb-1 mt-3">学号</p><p class="fw-bold">{{ user.student_id }}</p>
            <p class="text-muted mb-1 mt-3">专业班级</p><p class="fw-bold">{{ user.major }} {{ user.grade }} {{ user.class_name }}</p>
        </div>
    </div>

    <div class="col-md-8">
        <div class="apple-card">
            <h5 class="fw-bold mb-4 border-bottom pb-2">📤 登记我的竞赛记录</h5>
            <form method="POST" enctype="multipart/form-data">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted">比赛名称 (如: 蓝桥杯单片机组)</label>
                        <input type="text" name="competition_name" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted">所获奖项 (如: 一等奖)</label>
                        <input type="text" name="award" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted">比赛日期</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="col-md-6 d-flex align-items-center">
                        <div class="form-check form-check-inline mt-4">
                            <input class="form-check-input" type="radio" name="is_team" value="0" id="solo" checked>
                            <label class="form-check-label" for="solo">个人赛</label>
                        </div>
                        <div class="form-check form-check-inline mt-4">
                            <input class="form-check-input" type="radio" name="is_team" value="1" id="team">
                            <label class="form-check-label" for="team">团队赛</label>
                        </div>
                    </div>
                    <div class="col-12" id="teammates_div" style="display:none;">
                        <label class="form-label text-muted">队友姓名 (用逗号分隔)</label>
                        <input type="text" name="teammates" class="form-control" placeholder="张三, 李四">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted">上传奖状 (可选)</label>
                        <input type="file" name="certificate" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted">上传备赛资料/PPT (可选)</label>
                        <input type="file" name="materials" class="form-control">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 mt-4">提交到竞赛档案</button>
            </form>
        </div>
    </div>
</div>

<script>
// 监听团队赛选项
document.querySelectorAll('input[name="is_team"]').forEach((elem) => {
    elem.addEventListener("change", function(event) {
        document.getElementById('teammates_div').style.display = event.target.value === '1' ? 'block' : 'none';
    });
});
</script>
{% endblock %}
