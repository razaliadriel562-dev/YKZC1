{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">
        <div class="apple-card p-5">
            <h2 class="fw-bold mb-2 text-center" style="letter-spacing: -0.5px;">创建账号</h2>
            <p class="text-muted text-center mb-5">加入源控智创社团</p>
            <form method="POST">
                <div class="row g-4">
                    <div class="col-md-6"><input type="text" name="student_id" class="form-control" placeholder="学号" required></div>
                    <div class="col-md-6"><input type="text" name="name" class="form-control" placeholder="真实姓名" required></div>
                    <div class="col-md-6"><input type="text" name="major" class="form-control" placeholder="专业"></div>
                    <div class="col-md-6"><input type="text" name="grade" class="form-control" placeholder="年级 (如: 2024级)"></div>
                    <div class="col-md-6"><input type="text" name="class_name" class="form-control" placeholder="班级"></div>
                    <div class="col-md-6"><input type="text" name="phone" class="form-control" placeholder="手机号"></div>
                    <div class="col-12 mt-4">
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="设置密码" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 mt-5 py-3" style="font-size: 1.1rem;">注册并加入</button>
            </form>
            <div class="mt-4 pt-3 text-center border-top">
                <a href="{{ url_for('login') }}" class="text-decoration-none text-primary" style="font-size: 0.9rem; font-weight: 500;">已有账号？直接登录</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
