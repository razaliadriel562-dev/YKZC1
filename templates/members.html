{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">👥 社团成员管理</h2>
<table class="table table-hover neu-card">
    <thead>
        <tr>
            <th>学号</th>
            <th>姓名</th>
            <th>专业/年级/班级</th>
            <th>手机号</th>
            <th>权限</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.student_id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.major }} {{ user.grade }} {{ user.class_name }}</td>
            <td>{{ user.phone }}</td>
            <td>
                {% if user.is_admin %}
                <span class="badge bg-warning">管理员</span>
                {% else %}
                <span class="badge bg-secondary">普通成员</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
